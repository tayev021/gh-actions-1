name: Third Workflow

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Deploy
        run: echo "Deploying..."
