name: Development Workflow

on: push

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting
        run: echo "Hello"
  lint:
    runs-on: ubuntu-latest
    needs: [hello]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Run Linting
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    needs: [hello]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
  farewell:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Farewell
        run: echo "Bye, bye!"
